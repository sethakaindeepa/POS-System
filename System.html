<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orients POS System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="Style2.css">
</head>
<body>
<div class="container-fluid">
    <div class="row vh-100">

        <div class="col-md-3 col-lg-2 bg-success text-white p-3 d-flex flex-column">

            <div class="text-center">
                <img src="assets/junk food.png" class="img-fluid mb-2" style="max-height:120px;">
                <h5>Orients POS System</h5>
            </div>

            <div class="mt-4 flex-grow-1">
                <button class="btn btn-dark w-100 mb-2">Dashboard</button>
                <button class="btn btn-dark w-100 mb-2">Customer</button>
                <button class="btn btn-dark w-100 mb-2">Item</button>
                <button class="btn btn-dark w-100 mb-2">Order</button>
                <button class="btn btn-dark w-100 mb-2">Order History</button>
            </div>

            <button class="btn btn-danger w-100 mt-auto">
                Log out <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>

        <div class="col-md-9 col-lg-10 bg-light p-4">

            <div class="light-green-box text-white p-4 rounded mb-4">
                <h2>Your Choice is First.</h2>
                <p>Orients restaurant - Gampaha</p>
            </div>

            <div class="row g-4">

                <div class="col-md-4">
                    <div class="card food-card text-center">
                        <img src="assets/cheese%20burger.jpg" class="card-img-top">
                        <div class="card-body bg-dark text-white rounded-bottom">
                            Cheese Burger <br> Rs.130
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card food-card text-center">
                        <img src="assets/veggi%20burger.jfif" class="card-img-top">
                        <div class="card-body bg-dark text-white rounded-bottom">
                            Veggie Burger <br> Rs.150
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card food-card text-center">
                        <img src="assets/mushroom-burger.jpg" class="card-img-top">
                        <div class="card-body bg-dark text-white rounded-bottom">
                            Mushroom Burger <br> Rs.160
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card food-card text-center">
                        <img src="assets/primetime%20burger.jpg" class="card-img-top">
                        <div class="card-body bg-dark text-white rounded-bottom">
                            Primetime Burger <br> Rs.120
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card food-card text-center">
                        <img src="assets/french%20fries.webp" class="card-img-top">
                        <div class="card-body bg-dark text-white rounded-bottom">
                            French Fries <br> Rs.100
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card food-card text-center">
                        <img src="assets/nuggets.jpg" class="card-img-top">
                        <div class="card-body bg-dark text-white rounded-bottom">
                            Potato Gems <br> Rs.110
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
